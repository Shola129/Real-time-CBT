<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: aquamarine; color: whitesmoke;">
    <div style="width: 350px; height: 500px; padding: 50px;">
        <div style="background-color: green; text-align: center; color: white;">
            <h2>Login Form</h2>
        </div>
        <div style="background-color: aliceblue;">
            <input type="text" placeholder="email or phone" style="width: 300px; height: 40px;margin-left: 25px;"><br> <br>
            <input type="password" placeholder="Password" style="width: 300px; height: 40px;margin-left: 25px;"><br>
            <span style="color: green;margin-left: 25px;">Forget password</span><br> <br>

            <button style="width: 300px; height: 40px; background-color: green; color: aliceblue;margin-left: 25px;">Login</button>
            <br>
            <span style="text-align: center; color: black;margin-left: 25px;">Not a member ? <b style="color: green;">Sign up now</b></span>
        </div>
    </div>
</body>
</html>
