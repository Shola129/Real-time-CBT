<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
<title>Welcome · User Space</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
<style>
  :root {
    --navy:        #0a1628;
    --navy-mid:    #122040;
    --navy-light:  #1e3a6e;
    --navy-soft:   #2d5298;
    --red:         #c0392b;
    --red-dark:    #922b21;
    --red-light:   #f5b7b1;
    --white:       #ffffff;
    --off-white:   #f4f6fb;
    --border:      #d0d8ea;
    --ink-soft:    #6b7fa3;
    --r-md:  10px;
    --r-lg:  16px;
    --r-xl:  24px;
    --r-pill:99px;
    --shadow-md: 0 4px 24px rgba(10,22,40,.18);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--off-white);
    color: var(--navy);
    font-size: 14px;
    line-height: 1.6;
  }
  .landing-container {
    max-width: 480px;
    width: 90%;
    background: var(--white);
    border-radius: var(--r-xl);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    padding: 40px 32px;
    text-align: center;
  }
  .icon-circle {
    background: var(--navy);
    width: 76px;
    height: 76px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 22px;
    border: 3px solid var(--red);
  }
  .icon-circle i {
    font-size: 34px;
    color: var(--white);
  }
  .brand-tag {
    display: inline-block;
    background: var(--red);
    color: var(--white);
    font-size: 10px;
    font-family: sans-serif;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 3px 12px;
    border-radius: var(--r-pill);
    margin-bottom: 12px;
  }
  h2 {
    font-size: 26px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.25;
  }
  .welcome-message {
    background: #eef2fa;
    padding: 14px 18px;
    border-radius: var(--r-lg);
    margin: 12px 0 10px;
    font-family: sans-serif;
    font-size: 14px;
    color: var(--navy-mid);
    border-left: 4px solid var(--red);
    text-align: left;
    font-weight: 500;
  }
  .welcome-message i {
    color: var(--red);
    margin-right: 8px;
  }
  p {
    color: var(--ink-soft);
    margin: 10px 0 28px;
    font-family: sans-serif;
    font-size: 13px;
  }
  .divider {
    width: 48px;
    height: 3px;
    background: var(--red);
    border-radius: 2px;
    margin: 14px auto 24px;
  }
  .btn-get-started {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    justify-content: center;
    padding: 13px 24px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: var(--r-pill);
    font-size: 14px;
    font-family: sans-serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .03em;
    transition: background .18s, transform .12s;
  }
  .btn-get-started:hover { background: var(--navy-light); transform: translateY(-1px); }
  .btn-get-started:active { transform: translateY(0); }
  .btn-get-started i { font-size: 13px; }
  .footer-text {
    margin-top: 22px;
    font-size: 11px;
    font-family: sans-serif;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .footer-text i { color: var(--red); font-size: 11px; }
  .highlight {
    font-weight: 600;
    color: var(--navy);
  }
  @media (max-width: 480px) {
    .landing-container { padding: 32px 20px; }
    h2 { font-size: 22px; }
    .welcome-message { font-size: 13px; padding: 12px 14px; }
  }
</style>
</head>
<body>
<div class="landing-container">
  <div class="icon-circle">
    <i class="fas fa-user-astronaut"></i>   <!-- playful welcome icon: user in space -->
  </div>
  <h2>Welcome to  EduTest CBT</h2>
  <div class="divider"></div>
  

  
  <p>
    <i class="fas fa-chalkboard-user" style="margin-right: 6px;"></i> 
    Your central access point for examinations, assignments & progress tracking.
  </p>
  
  <button id="getStartedBtn" class="btn-get-started">
    <i class="fas fa-rocket"></i> Launch User Portal
  </button>
  
  <div class="footer-text">
    <i class="fas fa-shield-alt"></i>
    Secure & personalized environment — ready when you are
  </div>
</div>

<script>

  const btn = document.getElementById('getStartedBtn');

  btn.addEventListener('click', () => {
    window.location.href = '/cbt/ansofra/login';
  });
  
  
  
 
</script>
</body>
</html>
