<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Exam Board · Register</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
<style>
  :root {
    --navy:        #0a1628;
    --navy-mid:    #122040;
    --navy-light:  #1e3a6e;
    --navy-soft:   #2d5298;
    --red:         #c0392b;
    --red-dark:    #922b21;
    --red-light:   #f9e0de;
    --white:       #ffffff;
    --off-white:   #f4f6fb;
    --border:      #d0d8ea;
    --ink-mid:     #3a4f72;
    --ink-soft:    #6b7fa3;
    --r-md:  10px;
    --r-lg:  16px;
    --r-xl:  24px;
    --r-pill:99px;
    --shadow-md: 0 4px 24px rgba(10,22,40,.18);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: var(--off-white);
    color: var(--navy); font-size: 14px; line-height: 1.6;
    padding: 24px 0;
  }
  .register-container {
    max-width: 450px; width: 90%;
    background: var(--white);
    border-radius: var(--r-xl);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    padding: 32px 28px;
  }
  .register-header { text-align: center; margin-bottom: 22px; }
  .header-icon {
    width: 56px; height: 56px; background: var(--navy);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px; border: 2px solid var(--red);
  }
  .header-icon i { font-size: 22px; color: var(--white); }
  .register-header h3 { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .register-header p { font-size: 12px; font-family: sans-serif; color: var(--ink-soft); }
  .step-indicator {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin-bottom: 22px; font-family: sans-serif;
  }
  .step { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .step.done { background: #27ae60; color: var(--white); }
  .step.active { background: var(--navy); color: var(--white); }
  .step-line { width: 32px; height: 2px; background: var(--navy); border-radius: 1px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--navy-soft); font-family: sans-serif; }
  .form-control {
    padding: 10px 14px; border: 1.5px solid var(--border);
    border-radius: var(--r-pill); font-size: 13px; font-family: sans-serif;
    background: var(--white); width: 100%; color: var(--navy);
    transition: border-color .15s;
  }
  .form-control:focus { outline: none; border-color: var(--navy-soft); }
  .form-control::placeholder { color: var(--ink-soft); }
  .input-error  { border-color: var(--red) !important; }
  .input-success { border-color: #27ae60 !important; }
  .error-message { color: var(--red); font-size: 11px; margin-top: 3px; display: none; font-family: sans-serif; }
  .error-message.visible { display: block; }
  .password-strength { margin-top: 5px; font-size: 11px; font-family: sans-serif; }
  .strength-weak { color: var(--red); }
  .strength-medium { color: #d4ac0d; }
  .strength-strong { color: #27ae60; }
  .btn-register {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px 20px;
    background: var(--red); color: var(--white);
    border: none; border-radius: var(--r-pill);
    font-size: 13px; font-family: sans-serif; font-weight: 700;
    cursor: pointer; margin-top: 4px;
    transition: background .18s, transform .12s; letter-spacing: .03em;
  }
  .btn-register:hover { background: var(--red-dark); transform: translateY(-1px); }
  .btn-register:active { transform: translateY(0); }
  .links { text-align: center; margin-top: 18px; font-family: sans-serif; font-size: 12px; color: var(--ink-soft); }
  .links a { color: var(--red); text-decoration: none; font-weight: 600; }
  .links a:hover { text-decoration: underline; }
  .divider-line { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
</style>
</head>
<body>
<form id="data">
  <div class="register-container">
    <div class="register-header">
      <div class="header-icon"><i class="fas fa-user-check"></i></div>
      <h3>Complete Registration</h3>
      <p>Step 2 of 2 &mdash; Account details</p>
    </div>
    <div class="step-indicator">
      <div class="step done"><i class="fas fa-check" style="font-size:10px;"></i></div>
      <div class="step-line"></div>
      <div class="step active">2</div>
    </div>

    <div class="form-group">
      <label class="form-label">Full Name *</label>
      <input type="text" id="regName" class="form-control" placeholder="John Admin" name="fullname">
      <div class="error-message" id="nameError">Full name is required</div>
    </div>

    <div class="form-group">
      <label class="form-label">Email *</label>
      <input type="email" id="regEmail" class="form-control" placeholder="admin@example.com" name="email">
      <div class="error-message" id="emailError">Please enter a valid email address</div>
    </div>

    <div class="form-group">
      <label class="form-label">Phone Number *</label>
      <input type="tel" id="regPhone" class="form-control" placeholder="+1234567890 or 08012345678" name="phone">
      <div class="error-message" id="phoneError">Please enter a valid phone number (10–15 digits)</div>
    </div>

    <div class="form-group">
      <label class="form-label">Password *</label>
      <input type="password" id="regPassword" class="form-control" placeholder="min 6 chars" name="password">
      <div class="password-strength" id="passwordStrength"></div>
      <div class="error-message" id="passwordError">Password must be at least 6 characters with a letter and a number</div>
    </div>

    <div class="form-group">
      <label class="form-label">Confirm Password *</label>
      <input type="password" id="regComPassword" class="form-control" placeholder="Confirm password">
      <div class="error-message" id="confirmPasswordError">Passwords do not match</div>
    </div>

    <button id="registerBtn" type="button" class="btn-register">
      <i class="fas fa-check-circle"></i> Create Account
    </button>

    <hr class="divider-line" />
    <div class="links">
      <a href="#" id="loginLink">Already have an account? Sign in</a> &nbsp;&middot;&nbsp;
      <a href="#" id="backLink" style="color:var(--ink-soft);font-weight:400;">Back</a>
    </div>
  </div>
</form>

<script>
  const nameInput = document.getElementById('regName');
  const emailInput = document.getElementById('regEmail');
  const phoneInput = document.getElementById('regPhone');
  const passwordInput = document.getElementById('regPassword');
  const confirmPasswordInput = document.getElementById('regComPassword');
  const nameError = document.getElementById('nameError');
  const emailError = document.getElementById('emailError');
  const phoneError = document.getElementById('phoneError');
  const passwordError = document.getElementById('passwordError');
  const confirmPasswordError = document.getElementById('confirmPasswordError');
  const verifyEmail = localStorage.getItem('cbt-verifyEmail');

  function validateName() {
    const name = nameInput.value.trim();
    if (!name) { nameInput.classList.add('input-error'); nameInput.classList.remove('input-success'); nameError.textContent = 'Full name is required'; nameError.classList.add('visible'); return false; }
    else if (name.length < 2) { nameInput.classList.add('input-error'); nameInput.classList.remove('input-success'); nameError.textContent = 'Name must be at least 2 characters'; nameError.classList.add('visible'); return false; }
    else { nameInput.classList.remove('input-error'); nameInput.classList.add('input-success'); nameError.classList.remove('visible'); return true; }
  }

  function validateEmail() {
    const email = emailInput.value.trim();
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email) { emailInput.classList.add('input-error'); emailInput.classList.remove('input-success'); emailError.textContent = 'Email is required'; emailError.classList.add('visible'); return false; }
    else if (!re.test(email)) { emailInput.classList.add('input-error'); emailInput.classList.remove('input-success'); emailError.textContent = 'Please enter a valid email address'; emailError.classList.add('visible'); return false; }
    else { emailInput.classList.remove('input-error'); emailInput.classList.add('input-success'); emailError.classList.remove('visible'); return true; }
  }

  function validatePhone() {
    const phone = phoneInput.value.trim();
    const digits = phone.replace(/\D/g,'');
    if (!phone) { phoneInput.classList.add('input-error'); phoneInput.classList.remove('input-success'); phoneError.textContent = 'Phone number is required'; phoneError.classList.add('visible'); return false; }
    else if (digits.length < 10 || digits.length > 15) { phoneInput.classList.add('input-error'); phoneInput.classList.remove('input-success'); phoneError.textContent = 'Phone number must be between 10 and 15 digits'; phoneError.classList.add('visible'); return false; }
    else { phoneInput.classList.remove('input-error'); phoneInput.classList.add('input-success'); phoneError.classList.remove('visible'); return true; }
  }

  function checkPasswordStrength(password) {
    const div = document.getElementById('passwordStrength');
    if (!password.length) { div.innerHTML = ''; return; }
    let strength = 0;
    if (password.length >= 6) strength++;
    if (password.length >= 8) strength++;
    if (/\d/.test(password)) strength++;
    if (/[a-z]/.test(password)) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;
    let text = '', cls = '';
    if (strength <= 2) { text = 'Weak'; cls = 'strength-weak'; }
    else if (strength <= 4) { text = 'Medium'; cls = 'strength-medium'; }
    else { text = 'Strong'; cls = 'strength-strong'; }
    div.innerHTML = `Strength: <span class="${cls}">${text}</span>`;
  }

  function validatePassword() {
    const p = passwordInput.value;
    if (!p) { passwordInput.classList.add('input-error'); passwordInput.classList.remove('input-success'); passwordError.textContent = 'Password is required'; passwordError.classList.add('visible'); return false; }
    else if (p.length < 6) { passwordInput.classList.add('input-error'); passwordInput.classList.remove('input-success'); passwordError.textContent = 'Password must be at least 6 characters'; passwordError.classList.add('visible'); return false; }
    else if (!/[a-zA-Z]/.test(p) || !/[0-9]/.test(p)) { passwordInput.classList.add('input-error'); passwordInput.classList.remove('input-success'); passwordError.textContent = 'Must contain at least one letter and one number'; passwordError.classList.add('visible'); return false; }
    else { passwordInput.classList.remove('input-error'); passwordInput.classList.add('input-success'); passwordError.classList.remove('visible'); return true; }
  }

  function validateConfirmPassword() {
    const cp = confirmPasswordInput.value;
    if (!cp) { confirmPasswordInput.classList.add('input-error'); confirmPasswordInput.classList.remove('input-success'); confirmPasswordError.textContent = 'Please confirm your password'; confirmPasswordError.classList.add('visible'); return false; }
    else if (passwordInput.value !== cp) { confirmPasswordInput.classList.add('input-error'); confirmPasswordInput.classList.remove('input-success'); confirmPasswordError.textContent = 'Passwords do not match'; confirmPasswordError.classList.add('visible'); return false; }
    else { confirmPasswordInput.classList.remove('input-error'); confirmPasswordInput.classList.add('input-success'); confirmPasswordError.classList.remove('visible'); return true; }
  }

  nameInput.addEventListener('input', validateName); nameInput.addEventListener('blur', validateName);
  emailInput.addEventListener('input', validateEmail); emailInput.addEventListener('blur', validateEmail);
  phoneInput.addEventListener('input', validatePhone); phoneInput.addEventListener('blur', validatePhone);
  passwordInput.addEventListener('input', () => { validatePassword(); checkPasswordStrength(passwordInput.value); if (confirmPasswordInput.value) validateConfirmPassword(); });
  passwordInput.addEventListener('blur', validatePassword);
  confirmPasswordInput.addEventListener('input', validateConfirmPassword); confirmPasswordInput.addEventListener('blur', validateConfirmPassword);

  document.getElementById('registerBtn').addEventListener('click', async (e) => {
    e.preventDefault();
    const isNameValid = validateName();
    const isEmailValid = validateEmail();
    const isPhoneValid = validatePhone();
    const isPasswordValid = validatePassword();
    const isConfirmValid = validateConfirmPassword();
    if (isNameValid && isEmailValid && isPhoneValid && isPasswordValid && isConfirmValid) {
      const emailToVerify = emailInput.value.trim();
      if (verifyEmail && verifyEmail !== emailToVerify) {
        emailInput.classList.add('input-error'); emailInput.classList.remove('input-success');
        emailError.textContent = 'Email does not match verified email'; emailError.classList.add('visible'); return;
      }
      const time = new Date().toLocaleTimeString() + "  " + new Date().toLocaleDateString();
      const form = new FormData(document.getElementById('data'));
      form.append("date_created", time);
      const api = await fetch('/cbt/ansofra/apiadmin/register', { method: 'POST', body: form });
      const result = await api.json();
      if (result.status === 'success') { window.location.href = "/cbt/ansofra/ilease/login"; }
      else { alert(result.response); }
    } else {
      const firstError = document.querySelector('.input-error');
      if (firstError) firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });

  document.getElementById('loginLink').addEventListener('click', (e) => { e.preventDefault(); window.location.href = '/cbt/ansofra/ilease/login'; });
  document.getElementById('backLink').addEventListener('click', (e) => { e.preventDefault(); window.location.href = '/cbt/ansofra/ilease'; });
</script>
</body>
</html>
