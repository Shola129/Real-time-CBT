<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Exam Board · Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
<style>
  :root {
    --navy:        #0a1628;
    --navy-mid:    #122040;
    --navy-light:  #1e3a6e;
    --navy-soft:   #2d5298;
    --red:         #c0392b;
    --red-dark:    #922b21;
    --red-light:   #f9e0de;
    --white:       #ffffff;
    --off-white:   #f4f6fb;
    --border:      #d0d8ea;
    --ink-mid:     #3a4f72;
    --ink-soft:    #6b7fa3;
    --r-md:  10px;
    --r-lg:  16px;
    --r-xl:  24px;
    --r-pill:99px;
    --shadow-md: 0 4px 24px rgba(10,22,40,.18);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--off-white);
    color: var(--navy);
    font-size: 14px;
    line-height: 1.6;
  }
  .login-container {
    max-width: 420px;
    width: 90%;
    background: var(--white);
    border-radius: var(--r-xl);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    padding: 32px 28px;
  }
  .login-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .header-icon {
    width: 56px; height: 56px;
    background: var(--navy);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    border: 2px solid var(--red);
  }
  .header-icon i { font-size: 22px; color: var(--white); }
  .login-header h3 {
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .login-header p {
    font-size: 12px;
    font-family: sans-serif;
    color: var(--ink-soft);
  }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .form-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: var(--navy-soft);
    font-family: sans-serif;
  }
  .form-control {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--r-pill);
    font-size: 13px; font-family: sans-serif;
    background: var(--white);
    width: 100%;
    color: var(--navy);
    transition: border-color .15s;
  }
  .form-control:focus { outline: none; border-color: var(--navy-soft); }
  .form-control::placeholder { color: var(--ink-soft); }
  .input-error  { border-color: var(--red) !important; }
  .input-success { border-color: #27ae60 !important; }
  .error-message {
    color: var(--red); font-size: 11px;
    margin-top: 3px; display: none; font-family: sans-serif;
  }
  .error-message.visible { display: block; }
  .general-error {
    background: var(--red-light);
    border-left: 3px solid var(--red);
    color: var(--red-dark);
    padding: 10px 12px;
    border-radius: var(--r-md);
    margin-bottom: 14px;
    font-size: 12px; font-family: sans-serif;
    display: none;
  }
  .general-error.visible { display: block; }
  .btn-login {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px 20px;
    background: var(--navy); color: var(--white);
    border: none; border-radius: var(--r-pill);
    font-size: 13px; font-family: sans-serif; font-weight: 700;
    cursor: pointer; margin-top: 6px;
    transition: background .18s, transform .12s;
    letter-spacing: .03em;
  }
  .btn-login:hover { background: var(--navy-light); transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .links {
    text-align: center; margin-top: 18px;
    font-family: sans-serif; font-size: 12px;
    color: var(--ink-soft);
  }
  .links a { color: var(--red); text-decoration: none; font-weight: 600; }
  .links a:hover { text-decoration: underline; }
  .links .back-link { color: var(--ink-soft); font-weight: 400; }
  .divider-line {
    border: none; border-top: 1px solid var(--border);
    margin: 20px 0;
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <div class="header-icon"><i class="fas fa-lock"></i></div>
    <h3>Admin Sign-in</h3>
    <p>Exam Board Administration Portal</p>
  </div>

  <div id="generalError" class="general-error"></div>

  <form id="data">
    <div class="form-group">
      <label class="form-label">Email *</label>
      <input type="email" id="loginEmail" class="form-control" placeholder="admin@exam.com" value="admin@exam.com" name="email">
      <div class="error-message" id="emailError">Please enter a valid email address</div>
    </div>

    <div class="form-group">
      <label class="form-label">Admin ID *</label>
      <input type="text" id="ID" class="form-control" placeholder="ADMIN/34HIN/123456" name="ID">
      <div class="error-message" id="IDError">Please enter a valid ID</div>
    </div>

    <div class="form-group">
      <label class="form-label">Password *</label>
      <input type="password" id="loginPassword" class="form-control" placeholder="••••••" name="password">
      <div class="error-message" id="passwordError">Password is required</div>
    </div>

    <button id="loginBtn" type="button" class="btn-login">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
  </form>

  <hr class="divider-line" />
  <div class="links">
    <a href="#" id="registerLink">Create account</a> &nbsp;&middot;&nbsp;
    <a href="#" id="backLink" class="back-link">Back</a>
  </div>
</div>


<script>
  const emailInput = document.getElementById('loginEmail');
  const passwordInput = document.getElementById('loginPassword');
  const IDInput = document.getElementById("ID");
  const generalError = document.getElementById('generalError');
  const emailError = document.getElementById('emailError');
  const passwordError = document.getElementById('passwordError');
  const IDError = document.getElementById('IDError');

  function validateEmail() {
    const email = emailInput.value.trim();
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email) {
      emailInput.classList.add('input-error'); emailInput.classList.remove('input-success');
      emailError.textContent = 'Email is required'; emailError.classList.add('visible'); return false;
    } else if (!emailRegex.test(email)) {
      emailInput.classList.add('input-error'); emailInput.classList.remove('input-success');
      emailError.textContent = 'Please enter a valid email address'; emailError.classList.add('visible'); return false;
    } else {
      emailInput.classList.remove('input-error'); emailInput.classList.add('input-success');
      emailError.classList.remove('visible'); return true;
    }
  }

  function validatePassword() {
    const password = passwordInput.value;
    if (!password) {
      passwordInput.classList.add('input-error'); passwordInput.classList.remove('input-success');
      passwordError.textContent = 'Password is required'; passwordError.classList.add('visible'); return false;
    } else if (password.length < 6) {
      passwordInput.classList.add('input-error'); passwordInput.classList.remove('input-success');
      passwordError.textContent = 'Password must be at least 6 characters'; passwordError.classList.add('visible'); return false;
    } else {
      passwordInput.classList.remove('input-error'); passwordInput.classList.add('input-success');
      passwordError.classList.remove('visible'); return true;
    }
  }

  function validateID() {
    const IDIN = IDInput.value;
    if (!IDIN) {
      IDInput.classList.add('input-error'); IDInput.classList.remove('input-success');
      IDError.textContent = 'ID is required'; IDError.classList.add('visible'); return false;
    } else if (!IDIN.startsWith('ADMIN')) {
      IDInput.classList.add('input-error'); IDInput.classList.remove('input-success');
      IDError.textContent = 'ID must start with ADMIN'; IDError.classList.add('visible'); return false;
    } else {
      IDInput.classList.remove('input-error'); IDInput.classList.add('input-success');
      IDError.classList.remove('visible'); return true;
    }
  }

  function clearGeneralError() { generalError.classList.remove('visible'); generalError.textContent = ''; }
  function showGeneralError(msg) { generalError.textContent = msg; generalError.classList.add('visible'); }

  emailInput.addEventListener('input', () => { validateEmail(); clearGeneralError(); });
  emailInput.addEventListener('blur', validateEmail);
  passwordInput.addEventListener('input', () => { validatePassword(); clearGeneralError(); });
  passwordInput.addEventListener('blur', validatePassword);
  IDInput.addEventListener('input', () => { validateID(); clearGeneralError(); });
  IDInput.addEventListener('blur', validateID);

  document.getElementById('loginBtn').addEventListener('click', async (e) => {
    e.preventDefault();
    clearGeneralError();
    const isEmailValid = validateEmail();
    const isPasswordValid = validatePassword();
    const isID = validateID();
    if (isEmailValid && isPasswordValid && isID) {
      const data = document.getElementById('data');
      const form = new FormData(data);
      const api = await fetch('/cbt/ansofra/apiadmin/login', { method: 'POST', body: form });
      const result = await api.json();
      const response = result.response[0];
      if (result.status === 'success') {
        localStorage.setItem('cbt-admin-email', response.email);
        localStorage.setItem('cbt-admin-ID', response.ID);
        window.location.href = "/cbt/ansofra/ilease/dashboard";
      } else {
        showGeneralError(result.response || 'Invalid credentials. Please try again.');
        console.log(result);
      }
    }
  });

  document.getElementById('registerLink').addEventListener('click', (e) => {
    e.preventDefault(); window.location.href = '/cbt/ansofra/ilease/validateEmail';
  });
  document.getElementById('backLink').addEventListener('click', (e) => {
    e.preventDefault(); window.location.href = '/cbt/ansofra/ilease';
  });
</script>
</body>
</html>
