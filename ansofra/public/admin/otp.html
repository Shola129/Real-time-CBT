<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Exam Board · Verify Email</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
<style>
  :root {
    --navy:        #0a1628;
    --navy-mid:    #122040;
    --navy-light:  #1e3a6e;
    --navy-soft:   #2d5298;
    --red:         #c0392b;
    --red-dark:    #922b21;
    --red-light:   #f9e0de;
    --white:       #ffffff;
    --off-white:   #f4f6fb;
    --border:      #d0d8ea;
    --ink-mid:     #3a4f72;
    --ink-soft:    #6b7fa3;
    --r-md:  10px;
    --r-lg:  16px;
    --r-xl:  24px;
    --r-pill:99px;
    --shadow-md: 0 4px 24px rgba(10,22,40,.18);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: var(--off-white);
    color: var(--navy); font-size: 14px; line-height: 1.6;
  }
  .otp-container {
    max-width: 420px; width: 90%;
    background: var(--white);
    border-radius: var(--r-xl);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    padding: 36px 28px;
    text-align: center;
  }
  .header-icon {
    width: 64px; height: 64px;
    background: var(--navy);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    border: 2px solid var(--red);
  }
  .header-icon i { font-size: 26px; color: var(--white); }
  h3 { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .email-display {
    font-size: 12px; font-family: sans-serif; color: var(--ink-soft);
    background: var(--off-white); padding: 6px 14px;
    border-radius: var(--r-pill); display: inline-block; margin-bottom: 22px;
  }
  .email-display strong { color: var(--navy-soft); }
  .form-group { text-align: left; margin-bottom: 18px; }
  .form-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: var(--navy-soft);
    font-family: sans-serif; display: block; margin-bottom: 8px;
  }
  .form-control {
    width: 100%; padding: 14px 16px;
    font-size: 1.4rem; font-weight: 700; text-align: center;
    letter-spacing: 8px; border: 2px solid var(--border);
    border-radius: var(--r-lg); background: var(--white);
    color: var(--navy); font-family: monospace;
    transition: border-color .15s; outline: none;
  }
  .form-control:focus { border-color: var(--navy-soft); box-shadow: 0 0 0 3px rgba(45,82,152,.15); }
  .input-error  { border-color: var(--red) !important; }
  .input-success { border-color: #27ae60 !important; }
  .error-message {
    color: var(--red); font-size: 11px;
    margin-top: 5px; display: none; font-family: sans-serif; font-weight: 500;
  }
  .error-message.visible { display: block; }
  .general-error {
    background: var(--red-light); border-left: 3px solid var(--red);
    color: var(--red-dark); padding: 10px 12px;
    border-radius: var(--r-md); margin-bottom: 16px;
    font-size: 12px; font-family: sans-serif; display: none; text-align: left;
  }
  .general-error.visible { display: block; }
  .timer-card {
    background: var(--off-white); border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 12px 16px;
    margin: 18px 0 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .timer-label {
    font-size: 12px; font-weight: 600; color: var(--ink-mid);
    font-family: sans-serif; display: flex; align-items: center; gap: 6px;
  }
  .timer-label i { color: var(--red); font-size: 12px; }
  .countdown-box {
    background: var(--navy); color: var(--white);
    padding: 4px 14px; border-radius: var(--r-pill);
    font-weight: 800; font-size: 1.1rem;
    font-family: monospace; letter-spacing: 2px;
  }
  .status-badge {
    display: inline-block; padding: 3px 10px;
    border-radius: var(--r-pill); font-size: 10px; font-weight: 700;
    font-family: sans-serif; background: #d5f0e0; color: #196f3d;
  }
  .status-badge.expired { background: var(--red-light); color: var(--red-dark); }
  .btn-verify {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 13px 20px;
    background: var(--navy); color: var(--white);
    border: none; border-radius: var(--r-pill);
    font-size: 13px; font-family: sans-serif; font-weight: 700;
    cursor: pointer; transition: background .18s, transform .12s;
    letter-spacing: .03em;
  }
  .btn-verify:hover { background: var(--navy-light); transform: translateY(-1px); }
  .btn-verify:active { transform: translateY(0); }
  .btn-verify:disabled { background: #8fa3c8; cursor: not-allowed; transform: none; }
  .links {
    margin-top: 18px; display: flex; justify-content: center;
    gap: 20px; font-family: sans-serif;
  }
  .links a { font-size: 12px; color: var(--red); text-decoration: none; font-weight: 600; }
  .links a:hover { text-decoration: underline; }
  .resend-disabled { pointer-events: none; opacity: 0.4; }
  .success-toast {
    background: #d5f0e0; color: #196f3d;
    padding: 10px 12px; border-radius: var(--r-md);
    margin-bottom: 14px; font-size: 12px; font-family: sans-serif;
    display: flex; align-items: center; gap: 8px;
    animation: fadeInOut 3s ease forwards;
  }
  @keyframes fadeInOut {
    0% { opacity:0; transform:translateY(-4px); } 10% { opacity:1; transform:none; }
    90% { opacity:1; } 100% { opacity:0; }
  }
</style>
</head>
<body>
<div class="otp-container">
  <div class="header-icon"><i class="fas fa-envelope-open-text"></i></div>
  <h3>Verify your email</h3>
  <p class="email-display">Code sent to <strong id="otpEmailDisplay"></strong></p>

  <div id="generalError" class="general-error"></div>
  <div id="successMessage"></div>

  <div class="form-group">
    <label class="form-label">Verification Code *</label>
    <input type="text" id="otpCode" class="form-control" placeholder="000000" maxlength="6" autocomplete="off">
    <div class="error-message" id="otpError">Please enter a valid 6-digit code</div>
  </div>

  <div class="timer-card">
    <div class="timer-label"><i class="fas fa-hourglass-half"></i> Code validity</div>
    <div class="countdown-box" id="countdownDisplay">02:00</div>
    <div class="status-badge" id="statusBadge">Active</div>
  </div>

  <button id="verifyBtn" class="btn-verify">
    <i class="fas fa-check-circle"></i> Verify
  </button>

  <div class="links">
    <a href="#" id="resendLink">Resend code</a>
    <a href="#" id="backLink">Back to login</a>
  </div>
</div>

<script>
  const email = localStorage.getItem('cbt-email');
  const fullname = localStorage.getItem('cbt-name');
  let userEmail = localStorage.getItem('cbt-email');

  const otpInput = document.getElementById('otpCode');
  const verifyBtn = document.getElementById('verifyBtn');
  const resendLink = document.getElementById('resendLink');
  const backLink = document.getElementById('backLink');
  const generalError = document.getElementById('generalError');
  const otpError = document.getElementById('otpError');
  const countdownDisplay = document.getElementById('countdownDisplay');
  const statusBadge = document.getElementById('statusBadge');

  let timeLeftSeconds = 120;
  let timerInterval = null;
  let isTimerActive = true;
  let resendInProgress = false;

  if (userEmail) document.getElementById('otpEmailDisplay').innerText = userEmail;
  else document.getElementById('otpEmailDisplay').innerText = 'your email';

  function showError(message) {
    generalError.textContent = message; generalError.classList.add('visible');
    setTimeout(() => generalError.classList.remove('visible'), 4000);
  }
  function hideError() { generalError.classList.remove('visible'); generalError.textContent = ''; }

  function showSuccessToast(message) {
    const existing = document.querySelector('.success-toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'success-toast';
    toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
    document.querySelector('.otp-container').insertBefore(toast, document.querySelector('.form-group'));
    setTimeout(() => { if (toast) toast.remove(); }, 3000);
  }

  function updateTimerUI() {
    const m = Math.floor(timeLeftSeconds / 60);
    const s = timeLeftSeconds % 60;
    countdownDisplay.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if (timeLeftSeconds <= 0) {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      isTimerActive = false;
      statusBadge.textContent = 'Expired'; statusBadge.classList.add('expired');
      resendLink.classList.remove('resend-disabled');
      resendLink.style.pointerEvents = 'auto'; resendLink.style.opacity = '1';
      if (!generalError.textContent.includes('expired')) showError("OTP has expired. Please request a new code.");
      deleteOTPFromBackend();
    } else {
      isTimerActive = true; statusBadge.textContent = 'Active'; statusBadge.classList.remove('expired');
      resendLink.classList.add('resend-disabled');
      resendLink.style.pointerEvents = 'none'; resendLink.style.opacity = '0.4';
    }
  }

  function startCountdown(secs = 120) {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    timeLeftSeconds = secs; isTimerActive = true; updateTimerUI();
    timerInterval = setInterval(() => {
      if (timeLeftSeconds > 0) { timeLeftSeconds--; updateTimerUI(); if (timeLeftSeconds === 0) deleteOTPFromBackend(); }
      else { clearInterval(timerInterval); timerInterval = null; updateTimerUI(); }
    }, 1000);
  }

  async function deleteOTPFromBackend() {
    if (!userEmail) return;
    try {
      const r = await fetch('/cbt/ansofra/apiadmin/delete/otp', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail })
      });
      console.log("OTP cleanup:", await r.json());
    } catch(e) { console.error(e); }
  }

  function validateOtpInput() {
    const otp = otpInput.value.trim();
    if (!otp) {
      otpInput.classList.add('input-error'); otpInput.classList.remove('input-success');
      otpError.textContent = 'Verification code is required'; otpError.classList.add('visible'); return false;
    } else if (!/^\d{6}$/.test(otp)) {
      otpInput.classList.add('input-error'); otpInput.classList.remove('input-success');
      otpError.textContent = 'Please enter a valid 6-digit numeric code'; otpError.classList.add('visible'); return false;
    } else {
      otpInput.classList.remove('input-error'); otpInput.classList.add('input-success');
      otpError.classList.remove('visible'); return true;
    }
  }

  async function processOtp() {
    if (!validateOtpInput()) return;
    if (!isTimerActive || timeLeftSeconds <= 0) { showError("OTP has expired. Please request a new code."); return; }
    if (!userEmail) { showError("Session expired. Please login again."); setTimeout(() => window.location.href = '/cbt/ansofra/ilease/login', 1500); return; }
    verifyBtn.disabled = true; verifyBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying...';
    try {
      const api = await fetch('/cbt/ansofra/apiadmin/process/otp', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ otpCode: otpInput.value.trim(), email: userEmail, fullname })
      });
      const response = await api.json();
      if (response.status === 'success') {
        if (timerInterval) clearInterval(timerInterval);
        localStorage.setItem('cbt-email-otp', email);
        deleteOTPFromBackend();
        window.location.href = '/cbt/ansofra/ilease/2FA/verification';
      } else {
        showError(response.response || "Invalid verification code.");
        verifyBtn.disabled = false; verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> Verify';
        otpInput.value = ''; otpInput.classList.remove('input-success'); otpInput.classList.add('input-error');
        otpError.textContent = 'Invalid code. Please try again.'; otpError.classList.add('visible');
        otpInput.focus();
      }
    } catch(e) { showError("Network error. Please try again."); verifyBtn.disabled = false; verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> Verify'; }
  }

  async function resendOTP() {
    if (isTimerActive && timeLeftSeconds > 0) { showError(`Please wait ${timeLeftSeconds}s before requesting a new code.`); return; }
    if (resendInProgress) return;
    if (!userEmail) { showError("Session expired."); return; }
    resendInProgress = true; resendLink.style.pointerEvents = 'none'; resendLink.textContent = "Sending...";
    try {
      const api = await fetch('/cbt/ansofra/apiadmin/validateEmail', {
        method: "POST", headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail })
      });
      const response = await api.json();
      if (response.status === 'failed') {
        showSuccessToast("New verification code sent! Check your email.");
        otpInput.value = ''; otpInput.classList.remove('input-success','input-error');
        otpError.classList.remove('visible'); hideError(); startCountdown(120);
        verifyBtn.disabled = false; verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> Verify'; otpInput.focus();
      } else { showError(response.response || "Failed to resend code."); }
    } catch(e) { showError("Network error. Please try again."); }
    finally {
      resendInProgress = false; resendLink.textContent = "Resend code";
      if (timeLeftSeconds <= 0) { resendLink.classList.remove('resend-disabled'); resendLink.style.pointerEvents = 'auto'; resendLink.style.opacity = '1'; }
      else { resendLink.classList.add('resend-disabled'); resendLink.style.pointerEvents = 'none'; resendLink.style.opacity = '0.4'; }
    }
  }

  otpInput.addEventListener('input', function() {
    this.value = this.value.replace(/[^\d]/g,'').slice(0,6);
    validateOtpInput(); hideError();
  });
  otpInput.addEventListener('blur', validateOtpInput);
  otpInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); processOtp(); } });
  verifyBtn.addEventListener('click', (e) => { e.preventDefault(); processOtp(); });
  resendLink.addEventListener('click', (e) => { e.preventDefault(); resendOTP(); });
  backLink.addEventListener('click', (e) => {
    e.preventDefault(); if (timerInterval) clearInterval(timerInterval);
    localStorage.removeItem('cbt-email-otp'); window.location.href = '/cbt/ansofra/ilease/login';
  });

  document.addEventListener("DOMContentLoaded", () => {
    startCountdown(120); otpInput.focus();
  });
  window.addEventListener('beforeunload', () => { if (timerInterval) clearInterval(timerInterval); });
</script>
</body>
</html>
